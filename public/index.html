<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HTML to PDF</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      color: #333;
      min-height: 100vh;
    }

    .header {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      padding: 20px 24px;
      text-align: center;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .panels {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      min-height: 500px;
    }

    @media (max-width: 900px) {
      .panels { grid-template-columns: 1fr; }
    }

    .panel {
      display: flex;
      flex-direction: column;
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
      font-weight: 600;
      font-size: 14px;
      color: #475569;
    }

    .panel-header .badge {
      font-size: 11px;
      font-weight: 500;
      background: #e2e8f0;
      color: #64748b;
      padding: 2px 8px;
      border-radius: 10px;
    }

    textarea {
      flex: 1;
      border: none;
      outline: none;
      resize: none;
      padding: 16px;
      font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.6;
      tab-size: 2;
      color: #1e293b;
      background: #fafbfc;
    }

    textarea:focus {
      background: #fff;
    }

    .preview-frame {
      flex: 1;
      border: none;
      background: white;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .toolbar button {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      box-shadow: 0 2px 6px rgba(99, 102, 241, 0.3);
    }

    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-secondary {
      background: #f1f5f9;
      color: #475569;
    }

    .btn-secondary:hover { background: #e2e8f0; }

    .btn-icon { font-size: 18px; }

    .status {
      margin-left: auto;
      font-size: 13px;
      color: #94a3b8;
    }

    .status.error { color: #ef4444; }
    .status.success { color: #22c55e; }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e293b;
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
      z-index: 100;
    }

    .toast.show { opacity: 1; }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .placeholder-text {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      color: #94a3b8;
      font-size: 14px;
    }
  </style>
</head>
<body>

<div class="header">📄 HTML to PDF</div>

<div class="container">
  <div class="panels">
    <!-- Editor Panel -->
    <div class="panel">
      <div class="panel-header">
        <span>✏️ HTML Editor</span>
        <span class="badge">Paste your HTML here</span>
      </div>
      <textarea id="htmlInput" placeholder="&lt;h1&gt;Hello World&lt;/h1&gt;&#10;&lt;p&gt;Paste your HTML content here...&lt;/p&gt;"></textarea>
    </div>

    <!-- Preview Panel -->
    <div class="panel">
      <div class="panel-header">
        <span>👁️ Preview</span>
        <span class="badge">Live</span>
      </div>
      <iframe id="previewFrame" class="preview-frame" sandbox="allow-scripts"></iframe>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <button id="downloadBtn" class="btn-primary" onclick="downloadPdf()">
      <span class="btn-icon">⬇</span> Download PDF
    </button>
    <button class="btn-secondary" onclick="resetEditor()">
      Reset
    </button>
    <span id="status" class="status">Ready</span>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
  const htmlInput = document.getElementById('htmlInput');
  const previewFrame = document.getElementById('previewFrame');
  const downloadBtn = document.getElementById('downloadBtn');
  const statusEl = document.getElementById('status');
  const toast = document.getElementById('toast');

  // Live preview update
  function updatePreview() {
    const html = htmlInput.value;
    const fullHtml = /<html[\s>]/i.test(html)
      ? html
      : `<!DOCTYPE html><html><head><style>
          body { font-family: Arial, sans-serif; padding: 20px; line-height: 1.6; }
        </style></head><body>${html}</body></html>`;

    previewFrame.srcdoc = fullHtml;
  }

  // Debounced preview
  let previewTimeout;
  htmlInput.addEventListener('input', () => {
    statusEl.textContent = '✏️ Editing...';
    statusEl.className = 'status';
    clearTimeout(previewTimeout);
    previewTimeout = setTimeout(updatePreview, 400);
  });

  // Initial preview
  updatePreview();

  // Reset editor
  function resetEditor() {
    htmlInput.value = '';
    updatePreview();
    statusEl.textContent = 'Cleared';
    statusEl.className = 'status success';
    setTimeout(() => { statusEl.textContent = 'Ready'; statusEl.className = 'status'; }, 2000);
  }

  // Show toast message
  function showToast(msg, isError) {
    toast.textContent = msg;
    toast.className = 'toast show';
    toast.style.background = isError ? '#dc2626' : '#1e293b';
    setTimeout(() => { toast.className = 'toast'; }, 3000);
  }

  // Download PDF
  async function downloadPdf() {
    const html = htmlInput.value.trim();
    if (!html) {
      showToast('Please enter some HTML first', true);
      return;
    }

    downloadBtn.disabled = true;
    downloadBtn.innerHTML = '<span class="spinner"></span> Generating...';
    statusEl.textContent = '⏳ Generating PDF...';
    statusEl.className = 'status';

    try {
      const res = await fetch('/api/generate-pdf', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ html }),
      });

      if (!res.ok) {
        const errData = await res.json().catch(() => ({}));
        throw new Error(errData.error || `Server error (${res.status})`);
      }

      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'document.pdf';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);

      statusEl.textContent = '✅ PDF downloaded!';
      statusEl.className = 'status success';
      showToast('PDF downloaded successfully!');
    } catch (err) {
      statusEl.textContent = '❌ Error: ' + err.message;
      statusEl.className = 'status error';
      showToast('Error: ' + err.message, true);
    } finally {
      downloadBtn.disabled = false;
      downloadBtn.innerHTML = '<span class="btn-icon">⬇</span> Download PDF';
      setTimeout(() => {
        if (statusEl.className === 'status success' || statusEl.className === 'status error') {
          statusEl.textContent = 'Ready';
          statusEl.className = 'status';
        }
      }, 4000);
    }
  }
</script>

</body>
</html>
